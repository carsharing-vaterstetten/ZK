[env]
platform = espressif32
framework = arduino

monitor_speed = 921600

[esp32dev_base]
board = esp32dev
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder
build_unflags = -std=gnu++11
board_build.flash_mode = dio
board_build.f_flash = 80000000L
; board_build.f_cpu = 240000000L
build_flags =
    ${env.build_flags}
    -Wswitch-enum
    -std=gnu++17
    -mfix-esp32-psram-cache-issue
    -DBOARD_HAS_PSRAM
extra_scripts = platformio_override.py
board_build.filesystem = littlefs
lib_deps =
    https://github.com/lewisxhe/TinyGSM-fork
    arduino-libraries/ArduinoHttpClient@^0.6.1
    adafruit/Adafruit NeoPixel@^1.12.3
    adafruit/Adafruit PN532@^1.3.4
    bblanchon/ArduinoJson@^7.2.0

[env:dev]
extends = esp32dev_base
build_type = debug

[env:prod]
extends = esp32dev_base
build_type = release
build_flags =
    ${esp32dev_base.build_flags}
    -Ofast                             ; Level 3: Heavy optimization (vectorization, inlining)
    -ffast-math                     ; Relaxes floating point math for speed
    -fno-common                     ; Better variable placement in memory
    -fomit-frame-pointer            ; Frees up a register for data (Xtensa specific)
    -D CORE_DEBUG_LEVEL=0           ; Absolute zero system overhead
    -flto
    -fuse-linker-plugin             ; Ensures the compiler and linker talk the same LTO language
    -Wl,--gc-sections               ; Removes unused code sections
    -D SERIAL_SIZE_RX=2048
    -D SERIAL_SIZE_TX=512
build_unflags =
    ${esp32dev_base.build_unflags}
    -fno-lto
